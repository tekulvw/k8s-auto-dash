apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-auto-dash.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-auto-dash.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "k8s-auto-dash.selectorLabels" . | nindent 4 }}
