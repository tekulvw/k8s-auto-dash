name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: make test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm vitest run
      - name: Resolve icons commit
        id: icons
        run: echo "sha=$(curl -fsS https://api.github.com/repos/homarr-labs/dashboard-icons/commits/main | jq -r .sha)" >> $GITHUB_OUTPUT
      - name: Fetch icons
        env:
          ICONS_COMMIT: ${{ steps.icons.outputs.sha }}
        run: pnpm icons
      - name: Build
        run: pnpm run build
      - name: Playwright
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm exec playwright test

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: 'v3.14.0' }
      - run: helm lint deploy/helm/k8s-auto-dash
      - run: helm template test deploy/helm/k8s-auto-dash > /dev/null

  image:
    runs-on: ubuntu-latest
    needs: [go, ui, helm]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve icons commit
        id: icons
        run: echo "sha=$(curl -fsS https://api.github.com/repos/homarr-labs/dashboard-icons/commits/main | jq -r .sha)" >> $GITHUB_OUTPUT
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            ICONS_COMMIT=${{ steps.icons.outputs.sha }}
            VERSION=ci
